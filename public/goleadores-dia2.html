<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <title>App Futeba Dia 2 | Goleadores</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>Goleadores - Dia 2</h1>
        <div class="hero-actions">
          <a class="btn secondary" href="/dia2/ranking">Voltar ao Ranking</a>
        </div>
      </header>

      <section class="card">
        <label class="filter-row">
          <input id="only-with-goals" type="checkbox" checked />
          Mostrar apenas quem fez gol
        </label>
        <div id="ranking-list" class="ranking-list"></div>
      </section>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="/goleadores-dia2.js"></script>
    <script src="/pwa.js"></script>
  </body>
</html>
