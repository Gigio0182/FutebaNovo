<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Futeba | Ranking</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>Ranking de Atletas</h1>
        <div class="hero-actions">
          <a class="btn secondary" href="/">Ir para Login</a>
          <a class="btn secondary" href="/goleadores">Goleadores</a>
          <a class="btn secondary" href="/garcons">Garcons</a>
        </div>
      </header>

      <section class="card">
        <label class="search-row">
          Buscar atleta por nome
          <input id="ranking-search" type="search" placeholder="Digite o nome" />
        </label>
        <table class="ranking-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Atleta</th>
              <th>Jogos</th>
              <th>Gols</th>
              <th>Assistencias</th>
              <th>MVP</th>
              <th>Pior em campo</th>
            </tr>
          </thead>
          <tbody id="ranking-body"></tbody>
        </table>
      </section>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="/ranking.js"></script>
  </body>
</html>
