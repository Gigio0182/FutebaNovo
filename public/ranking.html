<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Futeba | Ranking</title>
    <link rel="stylesheet" href="/public/style.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>Ranking de Atletas</h1>
        <p>Pontuacao: gol = 2 pontos, assistencia = 1 ponto.</p>
        <a class="btn secondary" href="/">Voltar ao Registro</a>
        <form id="login-form" class="login-row">
          <input id="admin-password" type="password" placeholder="Senha de admin" required />
          <button class="btn" type="submit">Entrar</button>
          <button id="logout-btn" class="btn secondary" type="button">Sair</button>
        </form>
      </header>

      <section class="card">
        <table class="ranking-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Atleta</th>
              <th>Jogos</th>
              <th>Gols</th>
              <th>Assistencias</th>
              <th>Pontos</th>
            </tr>
          </thead>
          <tbody id="ranking-body"></tbody>
        </table>
      </section>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="/public/ranking.js"></script>
  </body>
</html>
