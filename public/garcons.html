<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Futeba | Garcons</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>Garcons</h1>
        <div class="hero-actions">
          <a class="btn secondary" href="/ranking">Ranking</a>
          <a class="btn secondary" href="/goleadores">Goleadores</a>
          <a class="btn secondary" href="/">Login</a>
        </div>
      </header>

      <section class="card">
        <label class="filter-row">
          <input id="only-with-assists" type="checkbox" checked />
          Mostrar apenas quem tem assistencias
        </label>
        <table class="ranking-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Atleta</th>
              <th>Assistencias</th>
            </tr>
          </thead>
          <tbody id="ranking-body"></tbody>
        </table>
      </section>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="/garcons.js"></script>
  </body>
</html>
