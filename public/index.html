<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>App Futeba | Login</title>
		<link rel="stylesheet" href="/public/style.css" />
	</head>
	<body>
		<main class="container narrow">
			<header class="hero">
				<h1>App Futeba</h1>
				<p>Entre para acessar o cadastro de atletas.</p>
			</header>

			<section class="card">
				<h2>Login</h2>
				<form id="login-form" class="grid-form" autocomplete="off">
					<label>
						Senha
						<input id="admin-password" type="password" placeholder="Sua senha" required autocomplete="current-password" />
					</label>
					<button class="btn" type="submit">Entrar</button>
				</form>
				<p id="status" class="status" aria-live="polite"></p>
				<a class="btn secondary" href="/public/ranking.html">Ver ranking publico</a>
			</section>
		</main>

		<script src="/public/login.js"></script>
	</body>
</html>
