<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <title>App Futeba | Cadastro de Atletas</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>Cadastro de Atletas</h1>
        <p>Cadastre atletas e incremente gols, assistencias e jogos.</p>
        <div class="hero-actions">
          <a class="btn secondary" href="/ranking">Ver Ranking</a>
          <a class="btn secondary" href="/goleadores">Goleadores</a>
          <a class="btn secondary" href="/garcons">Garçons</a>
          <button id="logout-btn" class="btn" type="button">Sair</button>
          <span id="sync-state" class="sync-pill"></span>
        </div>
      </header>

      <section class="card">
        <h2>Novo atleta</h2>
        <form id="athlete-form" class="grid-form">
          <label>
            Nome do atleta
            <input id="athlete-name" required maxlength="60" />
          </label>
          <button class="btn" type="submit">Cadastrar</button>
        </form>
      </section>

      <section class="card">
        <h2>Atletas cadastrados</h2>
        <div class="search-row">
          <input id="athlete-search" type="search" placeholder="Buscar atleta por nome" />
        </div>
        <div id="athletes-list" class="athletes-list"></div>
      </section>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="/athletes.js"></script>
    <script src="/pwa.js"></script>
  </body>
</html>
